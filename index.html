<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oliwia Jarząbek — AI Video Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ivory:       #F7F3EC;
  --ivory-deep:  #EDE8DF;
  --cream:       #FEFCF8;
  --beige:       #E8E1D5;
  --emerald:     #1C2B45;
  --emerald-mid: #2E4163;
  --emerald-soft:#D0D8E8;
  --emerald-mist:#E8EDF5;
  --navy:        #1C2B45;
  --navy-mid:    #2E4163;
  --navy-soft:   #D0D8E8;
  --ink:         #1C2B45;
  --ink-dim:     #4A5C72;
  --ink-faint:   #8A9BB0;
  --border:      rgba(28,43,69,0.08);
  --border-mid:  rgba(28,43,69,0.14);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'Inter Tight', system-ui, sans-serif;
  --r:     10px;
  --rl:    18px;
  --rxl:   28px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--ivory);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── SCROLL ANIMATIONS ─────────────────────────────── */
.reveal {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 0.75s cubic-bezier(.22,1,.36,1),
              transform 0.75s cubic-bezier(.22,1,.36,1);
}
.reveal.up    { transform: translateY(32px); }
.reveal.left  { transform: translateX(-32px); }
.reveal.right { transform: translateX(32px); }
.reveal.scale { transform: scale(0.94); }
.reveal.vis   { opacity:1; transform: none; }

.stagger-1 { transition-delay: 0.05s; }
.stagger-2 { transition-delay: 0.13s; }
.stagger-3 { transition-delay: 0.21s; }
.stagger-4 { transition-delay: 0.29s; }
.stagger-5 { transition-delay: 0.37s; }

/* ── NAV ───────────────────────────────────────────── */
nav {
  position: fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 48px; height: 62px;
  background: rgba(247,243,236,0.88);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  transition: box-shadow 0.3s;
}
nav.scrolled { box-shadow: 0 2px 20px rgba(28,43,69,0.07); }

.nav-logo {
  font-family: var(--serif); font-size:17px; font-weight:400;
  color: var(--ink); text-decoration:none; letter-spacing:0.01em;
}
.nav-logo em { font-style:italic; color: var(--emerald); }

.nav-links { display:flex; gap:28px; list-style:none; }
.nav-links a {
  color: var(--ink-dim); text-decoration:none;
  font-size:12px; font-weight:500; letter-spacing:0.08em;
  text-transform:uppercase; transition: color 0.2s;
}
.nav-links a:hover { color: var(--ink); }

.nav-cta {
  background: var(--emerald) !important;
  color: var(--cream) !important;
  padding: 8px 20px; border-radius: var(--r);
  font-size:12px !important; font-weight:600 !important;
  transition: background 0.2s !important;
}
.nav-cta:hover { background: var(--navy) !important; }

/* ── HERO ──────────────────────────────────────────── */
#hero {
  min-height: 100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:140px 40px 100px;
  position:relative; overflow:hidden;
}

/* ── Ghost text ── */
.hero-ghost {
  position:absolute; inset:0; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
  z-index:0; overflow:hidden;
}
.ghost-word {
  font-family: var(--serif);
  font-size: clamp(180px, 26vw, 360px);
  font-weight:300; font-style:italic;
  color: transparent;
  -webkit-text-stroke: 1.5px rgba(28,43,69,0.07);
  letter-spacing:-0.04em; line-height:1;
  user-select:none; white-space:nowrap;
  will-change:transform;
  transition: transform 0.08s linear;
}

/* ── Concentric rings ── */
.hero-rings {
  position:absolute; inset:0; pointer-events:none; z-index:0;
  display:flex; align-items:center; justify-content:center;
}
.ring {
  position:absolute; border-radius:50%;
  border: 1px solid rgba(28,43,69,0.07);
  will-change:transform; transition: transform 0.08s linear;
}
.ring-1 { width:700px; height:700px; animation: ringBreath 10s ease-in-out infinite; }
.ring-2 { width:500px; height:500px; animation: ringBreath 10s ease-in-out infinite 1.2s; border-color:rgba(28,43,69,0.09); }
.ring-3 { width:320px; height:320px; animation: ringBreath 10s ease-in-out infinite 2.4s; border-color:rgba(28,43,69,0.11); }
.ring-4 { width:160px; height:160px; animation: ringBreath 10s ease-in-out infinite 3.6s; border-color:rgba(28,43,69,0.08); }
@keyframes ringBreath {
  0%,100% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.03); opacity:0.65; }
}

/* ── Floating marks ── */
.hero-marks { position:absolute; inset:0; pointer-events:none; z-index:0; }
.mark {
  position:absolute; width:12px; height:12px;
  will-change:transform; transition: transform 0.12s linear;
}
.mark::before, .mark::after {
  content:''; position:absolute; background:rgba(28,43,69,0.15); border-radius:1px;
}
.mark::before { width:100%; height:1.5px; top:50%; left:0; transform:translateY(-50%); }
.mark::after  { width:1.5px; height:100%; left:50%; top:0; transform:translateX(-50%); }

/* ── Corner brackets ── */
.corner {
  position:absolute; width:24px; height:24px; z-index:1;
  opacity:0.2; transition: opacity 0.3s;
}
#hero:hover .corner { opacity:0.35; }
.c-tl { top:32px; left:40px; border-top:1.5px solid var(--navy); border-left:1.5px solid var(--navy); }
.c-tr { top:32px; right:40px; border-top:1.5px solid var(--navy); border-right:1.5px solid var(--navy); }
.c-bl { bottom:88px; left:40px; border-bottom:1.5px solid var(--navy); border-left:1.5px solid var(--navy); }
.c-br { bottom:88px; right:40px; border-bottom:1.5px solid var(--navy); border-right:1.5px solid var(--navy); }

/* ── Floating blobs ── */
.blob {
  position:absolute; border-radius:50%;
  filter: blur(70px); pointer-events:none;
  animation: blobDrift 18s ease-in-out infinite alternate;
}
.blob-1 {
  width:560px; height:460px;
  background: radial-gradient(ellipse, rgba(28,43,69,0.2) 0%, transparent 70%);
  top:-80px; left:-100px; animation-duration:20s;
}
.blob-2 {
  width:420px; height:420px;
  background: radial-gradient(ellipse, rgba(28,43,69,0.14) 0%, transparent 70%);
  top:20%; right:-80px; animation-duration:25s; animation-delay:-8s;
}
.blob-3 {
  width:340px; height:340px;
  background: radial-gradient(ellipse, rgba(28,43,69,0.16) 0%, transparent 70%);
  bottom:10%; left:25%; animation-duration:22s; animation-delay:-4s;
}
@keyframes blobDrift {
  0%   { transform: translate(0,0) scale(1); }
  33%  { transform: translate(30px,-20px) scale(1.05); }
  66%  { transform: translate(-20px,30px) scale(0.97); }
  100% { transform: translate(10px,10px) scale(1.03); }
}

/* ── Dot grid ── */
.dot-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image: radial-gradient(circle, rgba(28,43,69,0.14) 1px, transparent 1px);
  background-size: 36px 36px;
  mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 20%, transparent 80%);
}

/* ── Hero content z-index ── */
.hero-content { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; }

.hero-badge {
  display:inline-flex; align-items:center; gap:8px;
  background: var(--emerald-mist);
  border: 1px solid rgba(28,43,69,0.2);
  color: var(--emerald); font-size:11px; font-weight:600;
  letter-spacing:0.1em; text-transform:uppercase;
  padding: 6px 16px; border-radius:100px; margin-bottom:36px;
  position:relative;
}
.badge-dot {
  width:6px; height:6px; background:var(--emerald);
  border-radius:50%; animation: badgePulse 2.5s infinite;
}
@keyframes badgePulse {
  0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(28,43,69,0.4); }
  50% { opacity:0.7; box-shadow: 0 0 0 5px rgba(28,43,69,0); }
}

.hero-title {
  font-family: var(--serif);
  font-size: clamp(58px, 9vw, 110px);
  font-weight:300; line-height:1.0; letter-spacing:-0.02em;
  margin-bottom:28px; color: var(--navy);
}
.hero-title em { font-style:italic; color: var(--emerald); }

.hero-sub {
  font-size:17px; color: var(--ink-dim); font-weight:300;
  max-width:500px; line-height:1.75; margin-bottom:52px;
}

.hero-btns { display:flex; gap:14px; justify-content:center; align-items:center; }

.btn-p {
  background: var(--emerald); color: var(--cream);
  padding:14px 34px; border-radius:var(--r);
  font-size:14px; font-weight:600; text-decoration:none;
  letter-spacing:0.01em;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 18px rgba(28,43,69,0.22);
}
.btn-p:hover {
  background: var(--navy); transform:translateY(-2px);
  box-shadow: 0 8px 28px rgba(28,43,69,0.18);
}

.btn-s {
  color: var(--ink-dim); padding:14px 26px; border-radius:var(--r);
  font-size:14px; font-weight:500; text-decoration:none;
  border: 1px solid var(--border-mid); transition: all 0.2s;
}
.btn-s:hover { color:var(--ink); border-color: var(--emerald); background: var(--emerald-mist); }

/* Scroll cue */
.hero-scroll {
  position:absolute; bottom:38px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:9px;
  color: var(--ink-faint); font-size:10px; letter-spacing:0.12em;
  text-transform:uppercase; cursor:pointer; z-index:2;
}
.scroll-bar {
  width:1px; height:44px;
  background: linear-gradient(to bottom, var(--emerald), transparent);
  animation: scrollAnim 2.2s ease-in-out infinite;
}
@keyframes scrollAnim {
  0%   { transform:scaleY(0); transform-origin:top; opacity:1; }
  50%  { transform:scaleY(1); transform-origin:top; opacity:1; }
  51%  { transform:scaleY(1); transform-origin:bottom; opacity:1; }
  100% { transform:scaleY(0); transform-origin:bottom; opacity:0; }
}

/* ── MARQUEE STRIP ─────────────────────────────────── */
.marquee-wrap {
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background: var(--cream);
  overflow:hidden; padding:14px 0;
}
.marquee-track {
  display:flex; gap:0; white-space:nowrap;
  animation: marquee 28s linear infinite;
}
.marquee-item {
  display:inline-flex; align-items:center; gap:24px;
  padding:0 32px;
  font-size:12px; font-weight:500; letter-spacing:0.1em;
  text-transform:uppercase; color: var(--ink-dim);
}
.marquee-dot {
  width:4px; height:4px; border-radius:50%;
  background: var(--emerald); flex-shrink:0;
}
@keyframes marquee {
  0%   { transform:translateX(0); }
  100% { transform:translateX(-50%); }
}

/* ── SECTION SHELL ─────────────────────────────────── */
.section-wrap {
  max-width:1200px; margin:0 auto;
  padding: 100px 48px;
}

.section-eyebrow {
  display:inline-flex; align-items:center; gap:10px;
  font-size:11px; font-weight:600; letter-spacing:0.12em;
  text-transform:uppercase; color: var(--emerald); margin-bottom:18px;
}
.section-eyebrow::before {
  content:''; width:24px; height:1.5px; background:var(--emerald);
}

.section-h {
  font-family: var(--serif);
  font-size: clamp(34px, 4.5vw, 58px);
  font-weight:300; line-height:1.1; letter-spacing:-0.015em;
  color: var(--navy); margin-bottom:18px;
}
.section-h em { font-style:italic; color:var(--emerald); }

.section-p {
  color: var(--ink-dim); font-size:16px; line-height:1.75;
  max-width:520px; margin-bottom:56px;
}

/* ── SHOWREEL ──────────────────────────────────────── */
#reel-wrap { max-width:1200px; margin:0 auto; padding:20px 48px 80px; }

.reel-card {
  border-radius: var(--rxl);
  overflow:hidden; cursor:pointer;
  position:relative;
  aspect-ratio:21/9;
  background: var(--navy);
  border:1px solid rgba(28,43,69,0.12);
  transition: transform 0.35s cubic-bezier(.22,1,.36,1),
              box-shadow 0.35s cubic-bezier(.22,1,.36,1);
}
.reel-card:hover {
  transform:translateY(-4px) scale(1.005);
  box-shadow: 0 28px 60px rgba(28,43,69,0.18);
}

.reel-inner {
  width:100%; height:100%;
  background: linear-gradient(135deg, #0e1a2a 0%, #1c2b45 40%, #0f2318 70%, #1c2b45 100%);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}

.reel-blob-1 {
  position:absolute; width:50%; height:80%;
  background: radial-gradient(ellipse, rgba(28,43,69,0.35) 0%, transparent 65%);
  left:-5%; top:10%; filter:blur(50px);
  animation: blobDrift 15s ease-in-out infinite alternate;
}
.reel-blob-2 {
  position:absolute; width:40%; height:60%;
  background: radial-gradient(ellipse, rgba(247,243,236,0.08) 0%, transparent 65%);
  right:5%; bottom:0; filter:blur(60px);
  animation: blobDrift 20s ease-in-out infinite alternate-reverse;
}

.reel-content {
  position:relative; z-index:1; text-align:center;
}
.reel-eyebrow {
  font-size:11px; font-weight:600; letter-spacing:0.16em;
  text-transform:uppercase; color:rgba(200,222,215,0.7); margin-bottom:10px;
}
.reel-title {
  font-family:var(--serif); font-size:clamp(28px,4vw,48px);
  font-weight:300; font-style:italic; color: var(--ivory); margin-bottom:6px;
}
.reel-sub { font-size:13px; color:rgba(247,243,236,0.45); margin-bottom:28px; }

.reel-play {
  width:66px; height:66px; background:var(--emerald);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  margin:0 auto;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 6px 24px rgba(28,43,69,0.4);
}
.reel-card:hover .reel-play {
  transform:scale(1.1);
  box-shadow: 0 10px 36px rgba(28,43,69,0.5);
}

/* ── PORTFOLIO ─────────────────────────────────────── */
#portfolio-wrap { max-width:1200px; margin:0 auto; padding:0 48px 100px; }

/* Tab bar */
.tab-row {
  display:flex; gap:3px; margin-bottom:44px;
  background:var(--cream); padding:4px;
  border-radius:var(--rl); border:1px solid var(--border);
  overflow-x:auto; scrollbar-width:none;
}
.tab-row::-webkit-scrollbar { display:none; }

.tab-btn {
  flex:1; min-width:110px; padding:10px 18px;
  border-radius:12px; font-size:12px; font-weight:500;
  letter-spacing:0.03em; color:var(--ink-faint);
  cursor:pointer; transition:all 0.22s;
  background:transparent; border:none; white-space:nowrap;
  text-align:center; font-family:var(--sans);
}
.tab-btn:hover { color:var(--ink-dim); }
.tab-btn.on {
  background:var(--ivory); color:var(--navy);
  font-weight:600;
  border:1px solid var(--border-mid);
  box-shadow: 0 1px 4px rgba(28,43,69,0.06);
}

.tab-pane { display:none; }
.tab-pane.on { display:block; }

/* Video grid */
.vgrid { display:grid; gap:20px; }
.vgrid-3 { grid-template-columns:repeat(3,1fr); }
.vgrid-2 { grid-template-columns:repeat(2,1fr); }
.vgrid-feat { grid-template-columns:2fr 1fr; }
.vgrid-feat-col { display:flex; flex-direction:column; gap:20px; }

/* Video card */
.vcard {
  background:var(--cream); border:1px solid var(--border);
  border-radius:var(--rl); overflow:hidden; cursor:pointer;
  transition: transform 0.3s cubic-bezier(.22,1,.36,1),
              box-shadow 0.3s cubic-bezier(.22,1,.36,1),
              border-color 0.3s;
}
.vcard:hover {
  transform:translateY(-4px);
  box-shadow: 0 16px 40px rgba(28,43,69,0.1);
  border-color: rgba(28,43,69,0.25);
}

.vthumb {
  aspect-ratio:16/9; position:relative; overflow:hidden;
  background: var(--navy);
}
.vthumb.vert { aspect-ratio:9/16; }

.vthumb-inner {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}

/* Thumb gradients — navy/emerald on cream cards = nice contrast */
.g-brand   { background: linear-gradient(135deg,#0f1d30 0%,#1c3a28 55%,#0a1520 100%); }
.g-product { background: linear-gradient(135deg,#0c1928 0%,#132438 55%,#0a1a28 100%); }
.g-ugc     { background: linear-gradient(135deg,#1a1228 0%,#28183c 55%,#120f20 100%); }
.g-story   { background: linear-gradient(135deg,#1c0e22 0%,#2a1535 55%,#120c18 100%); }
.g-motion  { background: linear-gradient(135deg,#0c1f1a 0%,#13302a 55%,#081512 100%); }

.thumb-orb {
  position:absolute; border-radius:50%;
  filter:blur(28px); pointer-events:none;
  animation: orbDrift 7s ease-in-out infinite alternate;
}
@keyframes orbDrift {
  0%   { transform:translate(-8%,-8%) scale(1); }
  100% { transform:translate(8%,8%) scale(1.12); }
}

.o-em  { background:radial-gradient(circle,rgba(28,43,69,0.7) 0%,transparent 70%); width:55%;height:55%; }
.o-nav { background:radial-gradient(circle,rgba(61,138,106,0.5) 0%,transparent 70%); width:65%;height:65%; }
.o-iv  { background:radial-gradient(circle,rgba(247,243,236,0.25) 0%,transparent 70%); width:50%;height:50%; }
.o-pu  { background:radial-gradient(circle,rgba(130,80,180,0.5) 0%,transparent 70%); width:60%;height:60%; }
.o-ro  { background:radial-gradient(circle,rgba(190,80,110,0.45) 0%,transparent 70%); width:60%;height:60%; }

/* Scan lines overlay */
.scan-lines {
  position:absolute; inset:0; pointer-events:none;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(247,243,236,0.018) 3px, rgba(247,243,236,0.018) 4px
  );
}

.play-layer {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(28,43,69,0);
  transition:background 0.2s; z-index:2;
}
.vcard:hover .play-layer { background:rgba(28,43,69,0.28); }

.play-ring {
  width:46px; height:46px; border-radius:50%;
  background:var(--emerald);
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:scale(0.8);
  transition:opacity 0.22s, transform 0.22s;
  box-shadow: 0 4px 20px rgba(28,43,69,0.5);
}
.vcard:hover .play-ring { opacity:1; transform:scale(1); }

.dur-badge {
  position:absolute; bottom:10px; right:10px;
  background:rgba(12,22,36,0.75);
  color:rgba(247,243,236,0.9); font-size:11px; font-weight:600;
  padding:3px 8px; border-radius:6px; z-index:3;
}

.ai-pill {
  position:absolute; top:10px; left:10px;
  background:rgba(28,43,69,0.22);
  border:1px solid rgba(28,43,69,0.45);
  color:rgba(200,222,215,0.95); font-size:10px; font-weight:600;
  padding:3px 8px; border-radius:100px; letter-spacing:0.07em;
  text-transform:uppercase; z-index:3;
}

.status-pill {
  position:absolute; top:10px; right:10px;
  font-size:10px; font-weight:600; padding:3px 8px;
  border-radius:100px; letter-spacing:0.06em;
  text-transform:uppercase; z-index:3;
}
.st-live {
  background:rgba(28,43,69,0.22); border:1px solid rgba(28,43,69,0.45);
  color:rgba(200,222,215,0.9);
}
.st-wip {
  background:rgba(200,160,60,0.18); border:1px solid rgba(200,160,60,0.35);
  color:rgba(230,190,80,0.95);
}

.vinfo { padding:18px 20px 20px; }
.vtitle {
  font-family:var(--serif); font-size:18px; font-weight:400;
  color:var(--navy); margin-bottom:6px; line-height:1.3;
}
.vmeta {
  font-size:12px; color:var(--ink-faint);
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.vdot { width:3px;height:3px; background:var(--ink-faint); border-radius:50%; }
.vtags { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
.vtag {
  font-size:11px; font-weight:500; padding:3px 10px;
  border-radius:100px; background:var(--ivory);
  border:1px solid var(--border); color:var(--ink-dim);
}

/* ── ABOUT ─────────────────────────────────────────── */
#about-wrap { max-width:1200px; margin:0 auto; padding:100px 48px; }

.about-grid { display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; }

.about-vis {
  border-radius:var(--rxl); overflow:hidden;
  aspect-ratio:4/5; position:relative;

// ── SMOOTH NAV ─────────────────────────────────────────────
function go(e, id) {
  e.preventDefault();
  goid(id);
}
function goid(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── TABS ───────────────────────────────────────────────────
function tab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('on'));
  document.querySelector('[data-t="'+id+'"]').classList.add('on');
  document.getElementById('pane-'+id).classList.add('on');

  // Reveal cards in the new tab
  document.querySelectorAll('#pane-'+id+' .reveal').forEach(el => {
    el.classList.remove('vis');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        ro.observe(el);
      });
    });
  });
}

function openModal(id) {
  const d = MD[id] || { t:'Project', d:'Coming soon.' };
  document.getElementById('m-title').textContent = d.t;
  document.getElementById('m-desc').textContent = d.d;
  const area = document.getElementById('modal-vid-inner');

    area.innerHTML = '<span style="font-family:var(--serif);font-style:italic;color:rgba(28,43,69,0.35);font-size:17px">Video in production — check back soon</span>';

  const modal = document.getElementById('modal');
  if (d.vertical) modal.classList.add('vertical');
  else modal.classList.remove('vertical');
  modal.classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  const m = document.getElementById('modal'); m.classList.remove('on'); m.classList.remove('vertical');
  document.body.style.overflow = '';
}
function closeBg(e) {

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── MOUSEMOVE PARALLAX ────────────────────────────────────
(function(){
  const hero = document.getElementById('hero');
  if (!hero) return;
  let raf;
  hero.addEventListener('mousemove', (e) => {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      const r  = hero.getBoundingClientRect();
      const mx = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
      const my = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
      const gw = document.getElementById('ghost-word');
      if (gw) gw.style.transform = `translate(${mx * -30}px, ${my * -16}px)`;
      document.querySelectorAll('#hero-rings .ring').forEach(el => {
        const d = parseFloat(el.dataset.depth || 0.02) * 380;
        el.style.transform = `translate(${mx * d}px, ${my * d}px)`;
      });
      document.querySelectorAll('.hero-marks .mark').forEach(el => {
        const d = parseFloat(el.dataset.depth || 0.05) * 280;
        el.style.transform = `translate(${mx * d}px, ${my * d}px)`;
      });
    });
  });
  hero.addEventListener('mouseleave', () => {
    const gw = document.getElementById('ghost-word');
    if (gw) gw.style.transform = '';
    document.querySelectorAll('#hero-rings .ring, .hero-marks .mark')
      .forEach(el => el.style.transform = '');
  });
})();

});
